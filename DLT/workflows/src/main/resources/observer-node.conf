# Observer Node Configuration
# This configuration ensures the Observer node records all visible states for AML monitoring

# Record all visible states on the network
recordTransactions = "ALL_VISIBLE"

# Observer-specific settings
observerSettings {
    # Enable AML monitoring
    amlMonitoring = true
    
    # Database settings for compliance data
    database {
        jdbcUrl = "jdbc:h2:mem:observer_aml_db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE"
        username = "observer_user"
        password = "observer_password"
    }
    
    # Monitoring thresholds
    thresholds {
        # High value transaction threshold (in IDR cents)
        highValueThreshold = 10000000000  # 100 million IDR
        
        # Suspicious activity patterns
        rapidTransactionCount = 10
        rapidTransactionWindow = 300  # 5 minutes in seconds
    }
    
    # Reporting settings
    reporting {
        # Generate reports every hour
        reportInterval = 3600
        
        # Store reports for 7 years (regulatory requirement)
        retentionPeriod = 2555  # days
    }
}

# Network settings
networkServices {
    # Observer should connect to all network participants
    doormanURL = "https://doorman.network.com"
    networkMapURL = "https://netmap.network.com"
}

# Security settings
security {
    # Observer node security configuration
    authService {
        dataSource {
            type = "INMEMORY"
            users = [
                {
                    username = "observer_admin"
                    password = "observer_admin_password"
                    permissions = ["ALL"]
                }
            ]
        }
    }
}